apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-automation-project-deployment
  labels:
    app: devops-automation-project-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-automation-project-app
  template:
    metadata:
      labels:
        app: devops-automation-project-app
    spec:
      containers:
      - name: devops-demo-app
        image: yogithak/devops-automation-project-app:34
        ports:
        - containerPort: 9090
