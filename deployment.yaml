apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-devops-deployment
  labels:
    app: java-devops-automation-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-devops-automation-project
  template:
    metadata:
      labels:
        app: java-devops-automation-project
    spec:
      containers:
      - name: devops-demo-app
        image: yogithak/java-devops-automation-project:9
        ports:
        - containerPort: 9090
